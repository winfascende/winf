
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Winf Digital Ecosystem</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', { send_page_view: false });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              heading: ['Inter', 'sans-serif'],
            },
            colors: {
              winf: {
                background: '#09090b', // Zinc 950 - Fundo Profundo
                surface: '#18181b',    // Zinc 900 - Cards
                surface_hover: '#27272a', // Zinc 800
                border: '#27272a',        // Zinc 800 - Bordas sutis
                
                primary: '#ffffff', // White - Ações Principais (Substituindo o Laranja)
                primary_hover: '#f4f4f5',
                
                text_primary: '#fafafa', // Zinc 50
                text_secondary: '#a1a1aa', // Zinc 400
                text_muted: '#52525b', // Zinc 600

                // Legado para compatibilidade (atualizado para tema sombrio)
                deep_black: '#000000',
                aerocore_blue: '#18181b', // Zinc 900 - Substitui o azul brilhante
                ascend_green: '#052e16', // Green 950 - Substitui o verde brilhante
                darkpurple: '#1e1b4b', // Indigo 950 - Substitui o roxo brilhante
                capture: '#064e3b', // Dark Green - Substitui o verde de captura (mais sóbrio)
                grid: '#171717', // Neutral 900 - Substitui a cor do grid
                neural: '#0a0a0a', // Neutral 950 - Substitui a cor neural
                ascend: '#111827', // Gray 900 - Substitui a cor ascend
                warp: '#18181b', // Zinc 900 - Substitui a cor warp
                spotify: '#052e16', // Green 950 - Substitui a cor spotify (mantendo um tom verde muito escuro)
                funnel: '#18181b', // Zinc 900 - Substitui a cor do funil

              }
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'slide-in': 'slideIn 0.3s ease-out forwards',
              'glitch': 'glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite',
              'scanline': 'scanline 4s linear infinite',
              'shimmer': 'shimmer 2s infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideIn: { '0%': { transform: 'translateX(-100%)' }, '100%': { transform: 'translateX(0)' } },
              glitch: {
                '0%': { transform: 'translate(0)' },
                '20%': { transform: 'translate(-2px, 2px)' },
                '40%': { transform: 'translate(-2px, -2px)' },
                '60%': { transform: 'translate(2px, 2px)' },
                '80%': { transform: 'translate(2px, -2px)' },
                '100%': { transform: 'translate(0)' },
              },
              scanline: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #09090b; color: #fafafa; -webkit-font-smoothing: antialiased; }
      
      /* Scrollbar Invisível mas funcional para toque */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Otimizações Mobile */
      input, select, textarea { font-size: 16px !important; } /* Previne zoom no iOS */

      .scanline-overlay { position: relative; overflow: hidden; }
      .scanline-overlay::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.02) 50%);
        background-size: 100% 4px; pointer-events: none; z-index: 10;
      }
      .scanline-overlay-line {
        position: absolute; top: 0; left: 0; width: 100%; height: 2px;
        background: rgba(255, 255, 255, 0.1); animation: scanline 4s linear infinite;
        pointer-events: none; z-index: 11;
      }
    </style>
  </head>
  <body class="antialiased selection:bg-winf-primary/30 selection:text-white">
    <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
